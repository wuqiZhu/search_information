services:
  # TrendRadar - 信息采集
  trendradar:
    build:
      context: ./search_information/search_information/TrendRadar
      dockerfile: Dockerfile
    container_name: trendradar
    restart: always
    volumes:
      - ./search_information/search_information/TrendRadar/config:/app/config
      - ./data/search_information:/app/output
    env_file:
      - .env
    environment:
      - STORAGE_RETENTION_DAYS=30
    networks:
      - project-net

  # analyse_information - 信息分析
  analyser:
    build:
      context: ./search_information/analyse_information
      dockerfile: Dockerfile
    container_name: analyser
    command: sh -c "python analyzer/pipeline.py --rss && sleep 3600"
    restart: always
    volumes:
      - ./data/knowledge_base:/app/knowledge_base
    env_file:
      - .env
    networks:
      - project-net
    depends_on:
      - trendradar

  # 语义搜索API服务
  semantic-search:
    build:
      context: ./search_information/analyse_information
      dockerfile: Dockerfile
    container_name: semantic-search
    command: python analyzer/search_api.py --host 0.0.0.0 --port 5070
    restart: always
    ports:
      - "5070:5070"
    volumes:
      - ./data/knowledge_base:/app/knowledge_base
    env_file:
      - .env
    environment:
      - KB_PATH=/app/knowledge_base/obsidian
      - VECTOR_DB_PATH=/app/knowledge_base/vectors
    networks:
      - project-net
    depends_on:
      - analyser

  # invest - 投资分析后端
  invest-backend:
    build:
      context: ./invest
      dockerfile: Dockerfile
    container_name: invest-backend
    ports:
      - "5000:5000"
    restart: always
    volumes:
      - ./invest/scripts:/app/scripts
      - ./data/invest:/app/data
    env_file:
      - .env
    networks:
      - project-net

  # invest - 前端
  invest-frontend:
    build:
      context: ./invest/real-time-fund
      dockerfile: Dockerfile
    container_name: invest-frontend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - project-net
    depends_on:
      - invest-backend

  # 统一通知中心
  notification-center:
    build:
      context: ./search_information/search_information/notification_center
      dockerfile: Dockerfile
    container_name: notification-center
    restart: always
    ports:
      - "5050:5050"
    volumes:
      - ./data/notification:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro  # 挂载 docker socket 用于健康检查
    env_file:
      - .env
    networks:
      - project-net

  # 统一 Web Dashboard
  dashboard:
    build:
      context: ./search_information/search_information/dashboard_service
      dockerfile: Dockerfile
    container_name: dashboard
    restart: always
    ports:
      - "5060:5060"
    volumes:
      - ./data:/app/data:ro
    environment:
      - DATA_BASE=/app/data
      - ANALYSE_DB=/app/data/knowledge_base/analyzed.db
      - INVEST_DB=/app/data/invest/fund_data.db
    networks:
      - project-net

  # 反馈学习服务
  feedback-learner:
    build:
      context: ./Feedback_and_Learning
      dockerfile: Dockerfile
    container_name: feedback-learner
    restart: always
    volumes:
      - ./Feedback_and_Learning/invest/scripts:/app/scripts
      - ./data/feedback:/app/data
      - ./data/invest:/app/data/invest:ro
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - project-net
    depends_on:
      - invest-backend

networks:
  project-net:
    driver: bridge
