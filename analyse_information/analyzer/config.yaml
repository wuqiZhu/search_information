analyzer:
  defuddle:
    enabled: true
    output_format: "markdown"
    timeout: 30

  onefilellm:
    enabled: true
    output_format: "text"
    max_tokens: 4000

  ai:
    provider: "deepseek"
    api_key: "${DEEPSEEK_API_KEY}"
    api_base: "https://api.deepseek.com/v1"
    model: "deepseek-chat"
    max_tokens: 2000
    temperature: 0.3

  quality:
    slop_detector:
      enabled: false
    loki:
      enabled: false

  knowledge_base:
    path: "./knowledge_base"
    obsidian_path: "./knowledge_base/obsidian"
    raw_path: "./knowledge_base/raw"
    analyzed_path: "./knowledge_base/analyzed"
    translated_path: "./knowledge_base/translated"
    retention_days: 90

  rss_source: "../../search_information/TrendRadar/config.yaml"

  relevance:
    keywords:
      job_hunting:
        - "嵌入式Linux实习"
        - "C++开发实习"
        - "2026校招提前批"
        - "嵌入式校招"
        - "BSP工程师"
        - "实习僧"
        - "Boss直聘"
      interview:
        - "嵌入式面经2026"
        - "C++面经2026"
        - "Linux系统编程面试题"
        - "手撕代码嵌入式"
      policy:
        - "应届生租房补贴"
        - "大学生就业补贴江西"
        - "学生云服务器优惠"
        - "GitHub Student Pack"
      industry:
        - "嵌入式行业新闻"
        - "Linux内核新版本"
        - "RISC-V进展"
        - "Linux内核"
      leverage:
        - "开源之夏2026"
        - "Google Summer of Code"
        - "嵌入式竞赛2026"
        - "景德镇人才引进2026"
      tech:
        - "嵌入式"
        - "BSP"
        - "驱动"
        - "RISC-V"
        - "IoT"
        - "设备树"
        - "U-Boot"
        - "交叉编译"
        - "Yocto"
        - "Buildroot"
        - "GPIO"
        - "I2C"
        - "SPI"
        - "UART"
        - "RTOS"
        - "FreeRTOS"
        - "Zephyr"
    min_score: 6

  categories:
    - name: "01-求职招聘"
      keywords: ["实习", "校招", "招聘", "BSP工程师", "嵌入式工程师", "简历", "面试"]
      weight: 1.5
    - name: "02-面经题库"
      keywords: ["面经", "面试题", "笔试", "手撕代码", "LeetCode", "八股文"]
      weight: 1.2
    - name: "03-政策福利"
      keywords: ["补贴", "优惠", "学生", "GitHub Student", "GSoC", "人才引进"]
      weight: 1.0
    - name: "04-行业动态"
      keywords: ["行业", "新闻", "趋势", "公司", "大疆", "联发科", "Qualcomm", "NVIDIA"]
      weight: 0.8
    - name: "05-长期杠杆"
      keywords: ["开源之夏", "竞赛", "Coursera", "学习", "成长"]
      weight: 0.6
    - name: "06-嵌入式Linux"
      keywords: ["Linux", "内核", "Kernel", "Buildroot", "Yocto", "根文件系统", "交叉编译"]
      weight: 0.5
    - name: "07-BSP开发"
      keywords: ["BSP", "板级支持包", "U-Boot", "设备树", "Device Tree", "启动流程"]
      weight: 0.5
    - name: "08-设备驱动"
      keywords: ["驱动", "Driver", "GPIO", "I2C", "SPI", "UART", "中断", "DMA", "字符设备"]
      weight: 0.5
    - name: "09-RISC-V"
      keywords: ["RISC-V", "riscv", "SiFive", "平头哥", "玄铁"]
      weight: 0.5
    - name: "10-IoT"
      keywords: ["IoT", "物联网", "MQTT", "传感器", "RTOS", "FreeRTOS", "Zephyr"]
      weight: 0.5

  rss:
    enabled: true
    feeds:
      - name: "LWN.net"
        url: "https://lwn.net/headlines/newrss"
      - name: "Phoronix"
        url: "https://www.phoronix.com/rss.php"
      - name: "Linux Kernel Mailing List"
        url: "https://lore.kernel.org/lkml/?q=d:1.day.ago&x=A"
      - name: "CNX Software"
        url: "https://www.cnx-software.com/feed/"
      - name: "Linux Weekly News"
        url: "https://www.linux.com/rss/"
      - name: "Kernel.org"
        url: "https://www.kernel.org/feeds/all.atom.xml"
      - name: "Linux Journal"
        url: "https://www.linuxjournal.com/node/feed"
      - name: "Linux Gizmos"
        url: "https://linuxgizmos.com/feed/"
      - name: "Hackaday"
        url: "https://hackaday.com/feed/"
      - name: "Embedded.com"
        url: "https://www.embedded.com/feed/"
      - name: "EE Times"
        url: "https://www.eetimes.com/feed/"
      - name: "The Register"
        url: "https://www.theregister.com/headlines.atom"

  logging:
    level: "INFO"
    file: "./shared/logs/analyzer.log"
