[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "0s"
  hostname = "iot-telegraf"
  omit_hostname = false

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "iot_monitor"
  username = "iot_user"
  password = "iot123"
  retention_policy = ""
  write_consistency = "any"
  timeout = "5s"

[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST:-localhost}:1883"]
  topics = [
    "device/telemetry",
    "device/heartbeat",
    "device/alert"
  ]
  topic_tag = "topic"
  qos = 1
  connection_timeout = "30s"
  username = "${MQTT_USERNAME:-}"
  password = "${MQTT_PASSWORD:-}"
  data_format = "json"
  tag_keys = [
    "method",
    "device_id",
    "type",
    "level"
  ]
  string_fields = [
    "status",
    "message"
  ]

[[inputs.mqtt_consumer.topic_parsing]]
  topic = "+/telemetry"
  measurement = "measurement/_"
  tags = ""

[[inputs.mqtt_consumer.json_v2]]
  measurement_name = "device_telemetry"
  [[inputs.mqtt_consumer.json_v2.field]]
    path = "data.pir"
    type = "int"
  [[inputs.mqtt_consumer.json_v2.field]]
    path = "data.light"
    type = "int"
  [[inputs.mqtt_consumer.json_v2.field]]
    path = "data.humi"
    type = "int"
  [[inputs.mqtt_consumer.json_v2.field]]
    path = "data.temp"
    type = "int"
  [[inputs.mqtt_consumer.json_v2.field]]
    path = "data.relay"
    type = "int"
  [[inputs.mqtt_consumer.json_v2.field]]
    path = "data.relay2"
    type = "int"
  [[inputs.mqtt_consumer.json_v2.field]]
    path = "data.smoke_digital"
    type = "int"
