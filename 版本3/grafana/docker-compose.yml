version: '3.8'

services:
  influxdb:
    image: influxdb:1.8
    container_name: iot-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=iot_monitor
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-admin123}
      - INFLUXDB_USER=iot_user
      - INFLUXDB_USER_PASSWORD=${INFLUXDB_USER_PASSWORD:-iot123}
    volumes:
      - influxdb_data:/var/lib/influxdb
      - ./influxdb/init.iql:/docker-entrypoint-initdb.d/init.iql
    networks:
      - iot-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: iot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb
    networks:
      - iot-net

  telegraf:
    image: telegraf:1.30
    container_name: iot-telegraf
    restart: unless-stopped
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - influxdb
      - grafana
    networks:
      - iot-net

volumes:
  influxdb_data:
  grafana_data:

networks:
  iot-net:
    driver: bridge
