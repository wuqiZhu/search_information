<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i.MX6ULL 智慧环境监控系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .status-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.1rem;
            color: #374151;
            font-weight: 600;
        }

        .card-icon {
            font-size: 2rem;
        }

        .sensor-value {
            font-size: 3rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .sensor-unit {
            font-size: 1.2rem;
            color: #6b7280;
            font-weight: 400;
        }

        .sensor-label {
            font-size: 0.9rem;
            color: #9ca3af;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
        }

        .status-badge.active {
            background: #dcfce7;
            color: #166534;
        }

        .status-badge.inactive {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-badge.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .control-card {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
        }

        .btn-on {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-on:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            transform: scale(1.02);
        }

        .btn-off {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
            color: white;
        }

        .btn-off:hover {
            background: linear-gradient(135deg, #4b5563 0%, #374151 100%);
            transform: scale(1.02);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-danger:hover {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        .alert-card {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px solid #f59e0b;
        }

        .alert-card.normal {
            background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
            border-color: #22c55e;
        }

        .refresh-info {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .sensor-value {
                font-size: 2.5rem;
            }

            .status-bar {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>i.MX6ULL 智慧环境监控系统</h1>
            <p>IoT Smart Environment Monitoring System</p>
        </header>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="connectionStatus"></div>
                <span id="connectionText">连接中...</span>
            </div>
            <div>
                <span id="lastUpdate">最后更新: --:--:--</span>
            </div>
        </div>

        <div class="grid">
            <!-- 温度卡片 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">温度</span>
                    <span class="card-icon">🌡️</span>
                </div>
                <div class="sensor-value">
                    <span id="temperature">--</span>
                    <span class="sensor-unit">°C</span>
                </div>
                <div class="sensor-label">DHT11 温度传感器</div>
            </div>

            <!-- 湿度卡片 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">湿度</span>
                    <span class="card-icon">💧</span>
                </div>
                <div class="sensor-value">
                    <span id="humidity">--</span>
                    <span class="sensor-unit">%</span>
                </div>
                <div class="sensor-label">DHT11 湿度传感器</div>
            </div>

            <!-- PIR卡片 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">人体感应</span>
                    <span class="card-icon">👤</span>
                </div>
                <div style="margin: 20px 0;">
                    <span class="status-badge" id="pirStatus">检测中...</span>
                </div>
                <div class="sensor-label">PIR 红外传感器</div>
            </div>

            <!-- 光照卡片 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">光照状态</span>
                    <span class="card-icon">☀️</span>
                </div>
                <div style="margin: 20px 0;">
                    <span class="status-badge" id="lightStatus">检测中...</span>
                </div>
                <div class="sensor-label">光敏传感器</div>
            </div>

            <!-- 烟雾卡片 -->
            <div class="card" id="smokeCard">
                <div class="card-header">
                    <span class="card-title">烟雾检测</span>
                    <span class="card-icon">🔥</span>
                </div>
                <div style="margin: 20px 0;">
                    <span class="status-badge" id="smokeStatus">检测中...</span>
                </div>
                <div class="sensor-label">烟雾传感器</div>
            </div>

            <!-- 风扇控制卡片 -->
            <div class="card control-card">
                <div class="card-header">
                    <span class="card-title">风扇控制</span>
                    <span class="card-icon">🌀</span>
                </div>
                <div style="margin: 20px 0;">
                    <span class="status-badge" id="fanStatus">状态未知</span>
                </div>
                <button class="btn" id="fanBtn" onclick="toggleFan()">加载中...</button>
            </div>

            <!-- LED灯控制卡片 -->
            <div class="card control-card">
                <div class="card-header">
                    <span class="card-title">LED灯控制</span>
                    <span class="card-icon">💡</span>
                </div>
                <div style="margin: 20px 0;">
                    <span class="status-badge" id="ledStatus">状态未知</span>
                </div>
                <button class="btn" id="ledBtn" onclick="toggleLed()">加载中...</button>
            </div>

            <!-- LED控制卡片 -->
            <div class="card control-card">
                <div class="card-header">
                    <span class="card-title">板载LED</span>
                    <span class="card-icon">🔆</span>
                </div>
                <div style="margin: 20px 0;">
                    <span class="status-badge" id="boardLedStatus">状态未知</span>
                </div>
                <button class="btn" id="boardLedBtn" onclick="toggleBoardLed()">加载中...</button>
            </div>
        </div>

        <div class="refresh-info">
            <p>数据每 <span id="refreshInterval">2</span> 秒自动刷新 | 点击按钮控制设备</p>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let fanState = 0;
        let ledState = 0;
        let boardLedState = 0;

        // API请求函数
        async function apiCall(endpoint, method = 'GET', body = null) {
            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };
                if (body) {
                    options.body = JSON.stringify(body);
                }
                const response = await fetch(`${API_BASE}${endpoint}`, options);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('API call failed:', error);
                return null;
            }
        }

        // 更新传感器数据显示
        function updateSensorDisplay(data) {
            if (!data) return;

            // 更新连接状态
            document.getElementById('connectionStatus').classList.remove('offline');
            document.getElementById('connectionText').textContent = '已连接';

            // 更新时间
            const now = new Date();
            document.getElementById('lastUpdate').textContent =
                `最后更新: ${now.toLocaleTimeString()}`;

            // 温度
            if (data.temp !== undefined && data.temp !== -1) {
                document.getElementById('temperature').textContent = data.temp;
            }

            // 湿度
            if (data.humi !== undefined && data.humi !== -1) {
                document.getElementById('humidity').textContent = data.humi;
            }

            // PIR
            if (data.pir !== undefined) {
                const pirEl = document.getElementById('pirStatus');
                if (data.pir === 1) {
                    pirEl.textContent = '检测到有人';
                    pirEl.className = 'status-badge active';
                } else {
                    pirEl.textContent = '无人';
                    pirEl.className = 'status-badge inactive';
                }
            }

            // 光照
            if (data.light !== undefined) {
                const lightEl = document.getElementById('lightStatus');
                if (data.light === 0) {
                    lightEl.textContent = '明亮';
                    lightEl.className = 'status-badge active';
                } else {
                    lightEl.textContent = '黑暗';
                    lightEl.className = 'status-badge inactive';
                }
            }

            // 烟雾
            if (data.smoke_digital !== undefined) {
                const smokeEl = document.getElementById('smokeStatus');
                const smokeCard = document.getElementById('smokeCard');
                if (data.smoke_digital === 0) {
                    smokeEl.textContent = '⚠️ 检测到烟雾!';
                    smokeEl.className = 'status-badge warning';
                    smokeCard.classList.add('alert-card');
                    smokeCard.classList.remove('normal');
                } else {
                    smokeEl.textContent = '正常';
                    smokeEl.className = 'status-badge active';
                    smokeCard.classList.remove('alert-card');
                    smokeCard.classList.add('normal');
                }
            }

            // 继电器状态
            if (data.relay !== undefined) {
                fanState = data.relay;
                updateRelayDisplay('fan', fanState);
            }
            if (data.relay2 !== undefined) {
                ledState = data.relay2;
                updateRelayDisplay('led', ledState);
            }
        }

        // 更新继电器显示
        function updateRelayDisplay(type, state) {
            const statusEl = document.getElementById(`${type}Status`);
            const btnEl = document.getElementById(`${type}Btn`);

            if (state === 1) {
                statusEl.textContent = '已开启';
                statusEl.className = 'status-badge active';
                btnEl.textContent = '关闭';
                btnEl.className = 'btn btn-danger';
            } else {
                statusEl.textContent = '已关闭';
                statusEl.className = 'status-badge inactive';
                btnEl.textContent = '开启';
                btnEl.className = 'btn btn-on';
            }
        }

        // 获取传感器数据
        async function fetchSensorData() {
            const data = await apiCall('/sensors');
            if (data) {
                updateSensorDisplay(data);
            }
        }

        // 获取继电器状态
        async function fetchRelayStatus() {
            const relay1 = await apiCall('/relay/1');
            const relay2 = await apiCall('/relay/2');

            if (relay1) {
                fanState = relay1.state;
                updateRelayDisplay('fan', fanState);
            }
            if (relay2) {
                ledState = relay2.state;
                updateRelayDisplay('led', ledState);
            }
        }

        // 切换风扇
        async function toggleFan() {
            const newState = fanState === 1 ? 0 : 1;
            const result = await apiCall('/relay/1/control', 'POST', { state: newState });
            if (result && result.success) {
                fanState = newState;
                updateRelayDisplay('fan', fanState);
            }
        }

        // 切换LED灯
        async function toggleLed() {
            const newState = ledState === 1 ? 0 : 1;
            const result = await apiCall('/relay/2/control', 'POST', { state: newState });
            if (result && result.success) {
                ledState = newState;
                updateRelayDisplay('led', ledState);
            }
        }

        // 切换板载LED
        async function toggleBoardLed() {
            const newState = boardLedState === 1 ? 0 : 1;
            const result = await apiCall('/led/control', 'POST', { state: newState });
            if (result && result.success) {
                boardLedState = newState;
                const statusEl = document.getElementById('boardLedStatus');
                const btnEl = document.getElementById('boardLedBtn');
                if (boardLedState === 1) {
                    statusEl.textContent = '已开启';
                    statusEl.className = 'status-badge active';
                    btnEl.textContent = '关闭';
                    btnEl.className = 'btn btn-danger';
                } else {
                    statusEl.textContent = '已关闭';
                    statusEl.className = 'status-badge inactive';
                    btnEl.textContent = '开启';
                    btnEl.className = 'btn btn-on';
                }
            }
        }

        // 初始化
        async function init() {
            await fetchSensorData();
            await fetchRelayStatus();

            // 设置定时刷新
            setInterval(fetchSensorData, 2000);
            setInterval(fetchRelayStatus, 5000);
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
