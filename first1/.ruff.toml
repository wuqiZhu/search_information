# Ruff 配置文件
# 文档: https://docs.astral.sh/ruff/

# 目标 Python 版本
target-version = "py311"

# 行长度限制
line-length = 120

[lint]
# 启用的规则集
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]

# 忽略的规则
ignore = [
    "E501",   # 行过长 (由 formatter 处理)
    "B008",   # 函数调用作为默认参数
    "SIM108", # 三元表达式 (可读性)
]

[lint.per-file-ignores]
# 测试文件放宽一些规则
"**/test*.py" = ["B", "SIM"]
# 脚本文件
"**/scripts/**" = ["B"]

[format]
# 格式化配置
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[isort]
# isort 配置
known-first-party = ["invest", "analyse_information", "search_information", "Feedback_and_Learning"]
