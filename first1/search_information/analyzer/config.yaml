# 信息分析器配置

# Defuddle 配置
defuddle:
  enabled: true
  output_format: "markdown"
  timeout: 30

# AI 分析配置
ai:
  provider: "mimo"
  api_key: "${MIMO_API_KEY}"
  api_base: "https://token-plan-cn.xiaomimimo.com/v1"
  model: "mimo-v2.5-pro"
  max_tokens: 4000

# 成本限制配置（已移除限制，小米 MiMo 免费）
cost_limit:
  daily_calls: 9999
  daily_cost: 9999
  monthly_calls: 99999
  monthly_cost: 99999

# 知识库配置
knowledge_base:
  path: "../knowledge_base"
  obsidian_path: "../knowledge_base/obsidian"
  retention_days: 90

# 与我相关筛选
relevance:
  keywords:
    - "嵌入式"
    - "BSP"
    - "驱动"
    - "RISC-V"
    - "IoT"
    - "Linux内核"
    - "设备树"
    - "嵌入式Linux"
    - "边缘计算"
    - "AIoT"
  min_score: 0.3

# 分类规则
categories:
  - name: "嵌入式Linux"
    keywords: ["嵌入式Linux", "Embedded Linux", "Linux内核", "Linux Kernel"]
    path: "01-嵌入式Linux"
  - name: "BSP开发"
    keywords: ["BSP", "Board Support Package", "板级支持包"]
    path: "02-BSP开发"
  - name: "设备驱动"
    keywords: ["设备驱动", "Device Driver", "Device Tree", "DTS"]
    path: "03-设备驱动"
  - name: "RISC-V"
    keywords: ["RISC-V", "RISC V"]
    path: "04-RISC-V"
  - name: "IoT"
    keywords: ["IoT", "物联网", "边缘计算", "Edge Computing", "AIoT"]
    path: "05-IoT"
